services:
  - type: web
    name: smart-discussion-forum
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: "Smart Discussion Forum"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://smart-discussion-forum.onrender.com   # update after first deploy

      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: smart-discussion-forum-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: smart-discussion-forum-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: smart-discussion-forum-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: smart-discussion-forum-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: smart-discussion-forum-db
          property: password

      - key: SESSION_DRIVER
        value: database
      - key: SESSION_CONNECTION
        value: pgsql
      - key: CACHE_STORE
        value: database
      - key: DB_CACHE_CONNECTION
        value: pgsql
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_QUEUE_CONNECTION
        value: pgsql

      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

      - key: BROADCAST_CONNECTION
        value: log

      - key: MAIL_MAILER
        value: log

databases:
  - name: smart-discussion-forum-db
    plan: free
    databaseName: sdf
    user: sdf
